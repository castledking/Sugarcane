name: Build Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache paperweight
        uses: actions/cache@v4
        with:
          path: .gradle/caches/paperweight/default-cache-key
          key: default-cache-key-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Configure Git info (required for Paper patcher)
        run: |
          git config --global user.email "ci@sugarcane.internal"
          git config --global user.name "Sugarcane CI"

      - name: Build Paperclip Jar
        id: build
        run: |
          ./gradlew applyPatches
          ./gradlew createMojmapPaperclipJar
          BUILD_NUM=$(cat build.number | tr -d '[:space:]')
          JAR_NAME="sugarcane-1.21.11-${BUILD_NUM}.jar"
          mv paper-server/build/libs/paper-paperclip-*-mojmap.jar "paper-server/build/libs/${JAR_NAME}"
          {
            echo "build_num=${BUILD_NUM}"
            echo "jar_name=${JAR_NAME}"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare release body
        run: |
          git log -1 --pretty=%B > release_body.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.build.outputs.build_num }}
          target_commitish: ${{ github.sha }}
          name: "Build #${{ steps.build.outputs.build_num }}"
          body_path: release_body.md
          files: paper-server/build/libs/${{ steps.build.outputs.jar_name }}
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
