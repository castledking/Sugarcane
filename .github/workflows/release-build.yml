name: Build Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache paperweight
        uses: actions/cache@v4
        with:
          path: .gradle/caches/paperweight/default-cache-key
          key: default-cache-key-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Configure Git info (required for Paper patcher)
        run: |
          git config --global user.email "ci@sugarcane.internal"
          git config --global user.name "Sugarcane CI"

      - name: Build Paperclip Jar
        run: |
          ./gradlew applyPatches
          ./gradlew createMojmapPaperclipJar
          mv paper-server/build/libs/paper-paperclip-*-mojmap.jar paper-server/build/libs/sugarcane-1.21.11-${{ github.run_number }}.jar

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: paper-server/build/libs/sugarcane-*.jar
          token: ${{ secrets.GITHUB_TOKEN }}
